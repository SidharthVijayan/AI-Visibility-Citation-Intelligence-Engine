<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GEO Engine</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      width: 300px;
      padding: 15px;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    h2 {
      margin: 0;
      font-size: 18px;
    }

    p {
      font-size: 12px;
      opacity: 0.7;
      margin: 10px 0 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #3b82f6);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .footer {
      font-size: 10px;
      opacity: 0.5;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h2>🚀 GEO Engine</h2>
  <p>AI Visibility Intelligence</p>

  <button id="analyze">Open Dashboard</button>

  <div class="footer">v3.0</div>

</html>
